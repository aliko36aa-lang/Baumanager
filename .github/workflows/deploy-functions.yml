name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy invite-user function
        run: |
          curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_REF }}/functions" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{\"slug\":\"invite-user\",\"name\":\"invite-user\",\"body\":$(cat supabase/functions/invite-user/index.ts | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))'),\"verify_jwt\":true}"
