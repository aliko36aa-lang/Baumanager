name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy invite-user function
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          python3 << 'PYEOF'
          import json, os, sys
          import urllib.request, urllib.error

          with open('supabase/functions/invite-user/index.ts') as f:
              body = f.read()

          ref = os.environ['SUPABASE_PROJECT_REF']
          token = os.environ['SUPABASE_ACCESS_TOKEN']

          if not ref or not token:
              print('ERROR: Secrets not set!')
              sys.exit(1)

          print(f'Deploying to project: {ref[:8]}...')

          payload = json.dumps({
              'slug': 'invite-user',
              'name': 'invite-user',
              'body': body,
              'verify_jwt': True
          }).encode()

          headers = {
              'Authorization': f'Bearer {token}',
              'Content-Type': 'application/json'
          }

          req = urllib.request.Request(
              f'https://api.supabase.com/v1/projects/{ref}/functions',
              data=payload, headers=headers, method='POST'
          )
          try:
              with urllib.request.urlopen(req) as r:
                  print(f'Created successfully: {r.status}')
                  sys.exit(0)
          except urllib.error.HTTPError as e:
              resp = e.read().decode()
              if e.code == 409:
                  req2 = urllib.request.Request(
                      f'https://api.supabase.com/v1/projects/{ref}/functions/invite-user',
                      data=payload, headers=headers, method='PATCH'
                  )
                  try:
                      with urllib.request.urlopen(req2) as r:
                          print(f'Updated successfully: {r.status}')
                          sys.exit(0)
                  except urllib.error.HTTPError as e2:
                      print(f'PATCH failed {e2.code}: {e2.read().decode()}')
                      sys.exit(1)
              else:
                  print(f'POST failed {e.code}: {resp}')
                  sys.exit(1)
          PYEOF
