<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alem Facility PRO</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<style>
body{font-family:sans-serif;background:#f5f7fa;margin:0}
.hidden{display:none}
#app{display:none;padding:20px}
input,button{margin:5px;padding:10px}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>Login</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Passwort">
  <button onclick="login()">Login</button>
  <p id="err" style="color:red"></p>
</div>

<!-- APP -->
<div id="app">
  <h2>Dashboard</h2>
  <button onclick="logout()">Logout</button>

  <h3>Projekt hinzufügen</h3>
  <input id="title" placeholder="Titel">
  <input id="desc" placeholder="Beschreibung">
  <button onclick="addProject()">Speichern</button>

  <h3>Projekte</h3>
  <ul id="list"></ul>
</div>

<script>
console.log("APP STARTET");

// Fehler sichtbar machen
window.onerror = function(msg, url, line){
  console.error("FEHLER:", msg, "Zeile:", line);
};

// Supabase
const SUPABASE_URL = "https://mqgnuvsgrdsjuxaogpnd.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xZ251dnNncmRzanV4YW9ncG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjM5NDIsImV4cCI6MjA4OTc5OTk0Mn0.8C0EaWIitlhWtU_CkZ9RfnsJK8gEs5Lj_srrQTkJwe0";

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let user = null;

// LOGIN
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await db.auth.signInWithPassword({ email, password });

  if(error){
    document.getElementById("err").textContent = error.message;
    return;
  }

  user = data.user;
  startApp();
}

// LOGOUT
async function logout(){
  await db.auth.signOut();
  location.reload();
}

// APP START
function startApp(){
  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";
  loadProjects();
}

// PROJEKT SPEICHERN
async function addProject(){
  if(!user){
    alert("Nicht eingeloggt");
    return;
  }

  const title = document.getElementById("title").value;
  const description = document.getElementById("desc").value;

  const { error } = await db.from("projekte").insert({
    title: title,
    description: description,
    user_id: user.id
  });

  if(error){
    alert(error.message);
    return;
  }

  loadProjects();
}

// PROJEKTE LADEN
async function loadProjects(){
  const { data, error } = await db
    .from("projekte")
    .select("*")
    .eq("user_id", user.id);

  if(error){
    console.error(error);
    return;
  }

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(p => {
    const li = document.createElement("li");
    li.textContent = (p?.title || "-") + " | " + (p?.description || "-");
    list.appendChild(li);
  });
}

// SESSION CHECK
db.auth.getSession().then(({data})=>{
  if(data.session){
    user = data.session.user;
    startApp();
  }
});
</script>

</body>
</html>
