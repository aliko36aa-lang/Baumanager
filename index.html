<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alem Facility & Ausbau Service</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root{
  --bg:#F5F6F8;
  --card:#ffffff;
  --accent:#1B5FA8;
  --text:#111;
  --muted:#666;
  --border:#e5e7eb;
}

body{
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont;
  background:var(--bg);
}

/* LOGIN */
.login{
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.box{
  background:var(--card);
  padding:30px;
  border-radius:16px;
  width:100%;
  max-width:360px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

h1{
  font-size:20px;
  margin-bottom:5px;
}

.sub{
  color:var(--muted);
  font-size:13px;
  margin-bottom:20px;
}

input{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:1px solid var(--border);
}

button{
  width:100%;
  padding:12px;
  background:var(--accent);
  color:white;
  border:none;
  border-radius:10px;
  font-weight:600;
}

/* APP */
.app{
  display:none;
}

.top{
  padding:15px;
  background:white;
  border-bottom:1px solid var(--border);
  font-weight:600;
}

.content{
  padding:15px;
}

.card{
  background:white;
  padding:15px;
  border-radius:12px;
  margin-bottom:10px;
  border:1px solid var(--border);
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login" id="login">
  <div class="box">
    <h1>🏗️ Alem Facility</h1>
    <div class="sub">Ausbau Service Login</div>

    <input id="email" placeholder="E-Mail">
    <input id="pw" type="password" placeholder="Passwort">

    <button onclick="login()">Anmelden</button>
  </div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="top">
    Dashboard
  </div>

  <div class="content" id="content">
    <div class="card">Lade Daten...</div>
  </div>
</div>

<script>
const SUPA_URL = 'https://mqgnuvsgrdsjuxaogpnd.supabase.co';
const SUPA_KEY = 'sb_publishable_yiZnyi_a1-Be4nLx__H8fA_Gr4VppZ3';

const { createClient } = supabase;
const db = createClient(SUPA_URL, SUPA_KEY);

async function login(){
  const email = document.getElementById('email').value;
  const pw = document.getElementById('pw').value;

  const { data, error } = await db.auth.signInWithPassword({
    email: email,
    password: pw
  });

  if(error){
    alert(error.message);
    return;
  }

  startApp();
}

async function startApp(){
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  loadDashboard();
}

async function loadDashboard(){
  const { data } = await db.from('projekte').select('*');

  const content = document.getElementById('content');

  if(!data || data.length === 0){
    content.innerHTML = '<div class="card">Keine Projekte vorhanden</div>';
    return;
  }

  content.innerHTML = data.map(p => `
    <div class="card">
      <b>${p.name}</b><br>
      <span style="color:#666">${p.kunde || ''}</span>
    </div>
  `).join('');
}
</script>

</body>
			</html>
