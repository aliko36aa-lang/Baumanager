<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alem Facility PRO</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--p:#1a56db;--pl:#e8f0fe;--pd:#1340a8;--bg:#f0f4f8;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--sh:0 1px 3px rgba(0,0,0,.07),0 4px 12px rgba(0,0,0,.05);--sh2:0 8px 30px rgba(0,0,0,.12);--r:14px;--sw:250px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#ls{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(145deg,#071e56,#1a56db);padding:20px;}
.lc{background:#fff;border-radius:24px;padding:44px 40px;width:100%;max-width:400px;box-shadow:0 24px 80px rgba(0,0,0,.3);}
.lb{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.li{width:42px;height:42px;background:var(--p);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.ln{font-size:22px;font-weight:800;}
.lt{font-size:13px;color:var(--muted);margin-bottom:32px;}
.f{margin-bottom:14px;}
.f label{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;letter-spacing:.5px;}
.f input{width:100%;padding:13px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;font-family:inherit;outline:none;transition:all .2s;background:#fafafa;}
.f input:focus{border-color:var(--p);background:#fff;box-shadow:0 0 0 4px var(--pl);}
.bl{width:100%;padding:14px;background:var(--p);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;}
.le{color:var(--red);font-size:13px;margin-top:10px;text-align:center;}
#app{display:none;}
.sb{width:var(--sw);background:#0a1628;position:fixed;top:0;left:0;height:100vh;display:flex;flex-direction:column;z-index:100;transition:transform .3s;}
.sb-top{padding:24px 18px 18px;border-bottom:1px solid rgba(255,255,255,.06);}
.br{display:flex;align-items:center;gap:10px;}
.br-ic{width:38px;height:38px;background:var(--p);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.br-n{font-size:16px;font-weight:800;color:#fff;}
.br-s{font-size:10px;color:rgba(255,255,255,.35);}
.nav{flex:1;padding:14px 10px;overflow-y:auto;}
.ns{font-size:9px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:1.5px;padding:0 8px;margin:14px 0 5px;}
.ni{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;cursor:pointer;margin-bottom:1px;font-size:13px;font-weight:500;color:rgba(255,255,255,.55);transition:all .15s;}
.ni:hover{background:rgba(255,255,255,.07);color:#fff;}
.ni.active{background:var(--p);color:#fff;}
.ni-ic{font-size:15px;width:20px;text-align:center;flex-shrink:0;}
.sb-bot{padding:14px;border-top:1px solid rgba(255,255,255,.06);}
.ui{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;background:rgba(255,255,255,.05);margin-bottom:9px;overflow:hidden;}
.ua{width:30px;height:30px;background:var(--p);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.ue{font-size:11px;color:rgba(255,255,255,.45);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.blo{width:100%;padding:8px;background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.15);border-radius:8px;font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;}
.ct{margin-left:var(--sw);flex:1;padding:40px 28px 28px;}
.tb{display:none;position:fixed;top:0;left:0;right:0;height:54px;background:#fff;border-bottom:1px solid var(--border);align-items:center;padding:0 14px;z-index:90;gap:10px;}
.mb{background:none;border:none;font-size:20px;cursor:pointer;}
.tt{font-size:15px;font-weight:700;}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:95;}
@media(max-width:768px){.sb{transform:translateX(-100%)}.sb.open{transform:translateX(0)}.ct{margin-left:0;padding:66px 14px 20px}.tb{display:flex}.ov.show{display:block}}
.ph{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
.pt{font-size:22px;font-weight:800;}.ps{font-size:13px;color:var(--muted);margin-top:2px;}
.bp{display:inline-flex;align-items:center;gap:6px;padding:10px 18px;background:var(--p);color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;white-space:nowrap;}
.bp:hover{background:var(--pd);}
.sts{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:14px;margin-bottom:28px;}
.st{background:var(--card);border-radius:var(--r);padding:18px;box-shadow:var(--sh);border:1px solid var(--border);border-top:3px solid var(--p);}
.st.g{border-top-color:var(--green)}.st.o{border-top-color:var(--orange)}.st.pu{border-top-color:#8b5cf6;}
.si{font-size:20px;margin-bottom:8px;}.sv{font-size:26px;font-weight:800;line-height:1;}.sl{font-size:11px;color:var(--muted);font-weight:600;margin-top:3px;}
.gr{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.ca{background:var(--card);border-radius:var(--r);padding:18px;box-shadow:var(--sh);border:1px solid var(--border);cursor:pointer;transition:all .2s;}
.ca:hover{box-shadow:var(--sh2);transform:translateY(-2px);}
.ca-t{font-size:14px;font-weight:700;}.ca-s{font-size:12px;color:var(--muted);margin-top:3px;}.ca-f{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.bd{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.bd-b{background:#dbeafe;color:#1d4ed8}.bd-g{background:#d1fae5;color:#065f46}.bd-o{background:#fef3c7;color:#92400e}.bd-r{background:#fee2e2;color:#991b1b}
.tc{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;margin-bottom:20px;}
.th{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}.th-t{font-size:14px;font-weight:700;}
table{width:100%;border-collapse:collapse;}
th{padding:10px 18px;text-align:left;font-size:10px;font-weight:700;color:var(--muted);background:#f8fafc;border-bottom:1px solid var(--border);text-transform:uppercase;letter-spacing:.5px;}
td{padding:13px 18px;font-size:13px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none}tbody tr:hover td{background:#f8fbff}
.cal{background:var(--card);border-radius:var(--r);box-shadow:var(--sh);border:1px solid var(--border);overflow:hidden;margin-bottom:20px;}
.cal-head{padding:14px 18px;border-bottom:1px solid var(--border);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);}
.cal-day-h{background:#f8fafc;padding:8px 4px;text-align:center;font-size:10px;font-weight:700;color:var(--muted);}
.cal-day{background:#fff;padding:6px 4px;min-height:60px;cursor:pointer;}
.cal-day:hover{background:#f0f7ff}.cal-day.today{background:#eff6ff}
.cal-dn{font-size:11px;font-weight:600;color:var(--muted);margin-bottom:2px;}.cal-dn.cur{color:var(--p);font-weight:800;}
.cal-ev{font-size:10px;background:var(--pl);color:var(--pd);padding:2px 4px;border-radius:4px;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.map-wrap{border-radius:10px;overflow:hidden;height:200px;margin-top:10px;}
.map-wrap iframe{width:100%;height:100%;border:none;}
.em{text-align:center;padding:50px 20px;}.em-i{font-size:44px;margin-bottom:10px;opacity:.4;}.em-t{font-size:15px;font-weight:600;color:var(--muted);}.em-s{font-size:12px;color:var(--muted);margin-top:3px;}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.mo.open{display:flex}
.mi{background:#fff;border-radius:20px;padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.25);animation:mIn .2s ease;}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:none}}
.mt{font-size:17px;font-weight:800;margin-bottom:20px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fg{margin-bottom:12px;}.fg label{display:block;font-size:10px;font-weight:700;color:var(--muted);margin-bottom:4px;letter-spacing:.4px;}
.fg input,.fg select,.fg textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-family:inherit;outline:none;transition:all .2s;background:#fafafa;}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--p);background:#fff;box-shadow:0 0 0 3px var(--pl);}
.ma{display:flex;gap:8px;margin-top:20px;}
.bc{flex:1;padding:11px;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;}
.bs{flex:2;padding:11px;background:var(--p);color:#fff;border:none;border-radius:9px;font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;}
.bs:hover{background:var(--pd)}
.bk{display:inline-flex;align-items:center;gap:5px;font-size:13px;font-weight:700;color:var(--p);background:none;border:none;cursor:pointer;font-family:inherit;padding:0;margin-bottom:18px;}
.sh{font-size:15px;font-weight:800;margin:24px 0 12px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;}
.info-box{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--sh);border:1px solid var(--border);}
.info-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.5px;margin-bottom:4px;}.info-val{font-size:14px;font-weight:600;}
.photo-up{border:2px dashed var(--border);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;}
.photo-up:hover{border-color:var(--p);background:var(--pl)}
.photo-prev{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}.pt-img{width:70px;height:70px;border-radius:8px;object-fit:cover;}
.ld{text-align:center;padding:50px;color:var(--muted);}
.offer-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}.offer-row input{flex:1;}.price-inp{width:100px;flex-shrink:0;}
.offer-total{background:var(--pl);border-radius:10px;padding:12px 16px;font-size:15px;font-weight:800;color:var(--pd);margin-top:10px;}
</style>
</head>
<body>
<div id="ls">
  <div class="lc">
    <div class="lb"><div class="li">🏗️</div><div class="ln">Alem Facility</div></div>
    <div class="lt">PRO · Baustellen Management</div>
    <div class="f"><label>E-MAIL</label><input id="le" type="email" placeholder="name@firma.de"></div>
    <div class="f"><label>PASSWORT</label><input id="lp" type="password" placeholder="••••••••"></div>
    <button class="bl" onclick="dL()">Anmelden →</button>
    <div id="lerr" class="le"></div>
  </div>
</div>
<div class="tb" id="tb"><button class="mb" onclick="tSB()">☰</button><span class="tt" id="tt">Dashboard</span></div>
<div class="ov" id="ov" onclick="cSB()"></div>
<div id="app">
  <aside class="sb" id="sb">
    <div class="sb-top"><div class="br"><div class="br-ic">🏗️</div><div><div class="br-n">Alem Facility</div><div class="br-s">PRO Edition</div></div></div></div>
    <nav class="nav">
      <div class="ns">ÜBERSICHT</div>
      <div class="ni active" data-p="dash" onclick="go('dash')"><span class="ni-ic">🏠</span>Dashboard</div>
      <div class="ns">KUNDEN & PROJEKTE</div>
      <div class="ni" data-p="kunden" onclick="go('kunden')"><span class="ni-ic">👥</span>Kunden</div>
      <div class="ni" data-p="proj" onclick="go('proj')"><span class="ni-ic">🏗️</span>Projekte</div>
      <div class="ni" data-p="termine" onclick="go('termine')"><span class="ni-ic">📅</span>Termine</div>
      <div class="ni" data-p="angebote" onclick="go('angebote')"><span class="ni-ic">📄</span>Angebote</div>
      <div class="ns">RESSOURCEN</div>
      <div class="ni" data-p="mit" onclick="go('mit')"><span class="ni-ic">👷</span>Mitarbeiter</div>
      <div class="ni" data-p="std" onclick="go('std')"><span class="ni-ic">⏱️</span>Stunden</div>
      <div class="ni" data-p="mat" onclick="go('mat')"><span class="ni-ic">🧱</span>Material</div>
      <div class="ns">FINANZEN</div>
      <div class="ni" data-p="rech" onclick="go('rech')"><span class="ni-ic">💶</span>Rechnungen</div>
    </nav>
    <div class="sb-bot">
      <div class="ui"><div class="ua" id="ua">A</div><div class="ue" id="ue">–</div></div>
      <button class="blo" onclick="dLo()">🚪 Abmelden</button>
    </div>
  </aside>
  <main class="ct" id="ct"><div class="ld">Wird geladen…</div></main>
</div>
<div class="mo" id="mo" onclick="if(event.target===this)cM()"><div class="mi" id="mi"></div></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SU="https://mqgnuvsgrdsjuxaogpnd.supabase.co";
const SK="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1xZ251dnNncmRzanV4YW9ncG5kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyMjM5NDIsImV4cCI6MjA4OTc5OTk0Mn0.8C0EaWIitlhWtU_CkZ9RfnsJK8gEs5Lj_srrQTkJwe0";
const sb=window.supabase.createClient(SU,SK);
let me=null;
async function dL(){const e=document.getElementById('le').value.trim(),p=document.getElementById('lp').value;const er=document.getElementById('lerr');er.textContent='';if(!e||!p){er.textContent='Bitte alle Felder ausfüllen.';return;}const b=document.querySelector('.bl');b.textContent='…';b.disabled=true;const{data,error}=await sb.auth.signInWithPassword({email:e,password:p});b.textContent='Anmelden →';b.disabled=false;if(error){er.textContent='❌ '+(error.message.includes('Invalid')?'Falsche Zugangsdaten.':error.message);return;}sA(data.user);}
async function dLo(){await sb.auth.signOut();location.reload();}
function sA(u){me=u;document.getElementById('ls').style.display='none';document.getElementById('app').style.display='block';document.getElementById('tb').style.display='flex';document.getElementById('ue').textContent=u.email;document.getElementById('ua').textContent=u.email[0].toUpperCase();go('dash');}
const titles={dash:'Dashboard',kunden:'Kunden',proj:'Projekte',termine:'Termine',angebote:'Angebote',mit:'Mitarbeiter',std:'Stunden',mat:'Material',rech:'Rechnungen'};
function go(p){document.querySelectorAll('.ni').forEach(el=>el.classList.toggle('active',el.dataset.p===p));document.getElementById('tt').textContent=titles[p]||p;cSB();({dash:pgDash,kunden:pgKunden,proj:pgProj,termine:pgTermine,angebote:pgAngebote,mit:pgMit,std:pgStd,mat:pgMat,rech:pgRech})[p]?.();}
function tSB(){document.getElementById('sb').classList.toggle('open');document.getElementById('ov').classList.toggle('show');}
function cSB(){document.getElementById('sb').classList.remove('open');document.getElementById('ov').classList.remove('show');}
function sC(h){document.getElementById('ct').innerHTML=h;}
function ld(){sC('<div class="ld">⏳ Wird geladen…</div>');}
function oM(h){document.getElementById('mi').innerHTML=h;document.getElementById('mo').classList.add('open');}
function cM(){document.getElementById('mo').classList.remove('open');}
async function pgDash(){ld();try{const[r1,r2,r3,r4]=await Promise.all([sb.from('projekte').select('*'),sb.from('kunden').select('*'),sb.from('termine').select('*'),sb.from('rechnungen').select('betrag,status')]);const proj=r1.data||[],ku=r2.data||[],t=r3.data||[],r=r4.data||[];const offen=r.filter(x=>x.status==='offen').reduce((s,x)=>s+(parseFloat(x.betrag)||0),0);const heute=new Date().toISOString().split('T')[0];const hT=t.filter(x=>x.datum===heute);sC(`<div class="ph"><div><div class="pt">Guten Tag! 👋</div><div class="ps">Übersicht deiner Baustellen</div></div></div><div class="sts"><div class="st"><div class="si">🏗️</div><div class="sv">${proj.length}</div><div class="sl">Projekte</div></div><div class="st g"><div class="si">👥</div><div class="sv">${ku.length}</div><div class="sl">Kunden</div></div><div class="st o"><div class="si">📅</div><div class="sv">${hT.length}</div><div class="sl">Heute Termine</div></div><div class="st pu"><div class="si">💶</div><div class="sv">€${offen.toFixed(0)}</div><div class="sl">Offene Rechnungen</div></div></div><div class="sh">Aktuelle Projekte</div>${!proj.length?'<div class="em"><div class="em-i">🏗️</div><div class="em-t">Noch keine Projekte</div></div>':`<div class="gr">${proj.slice(0,6).map(p=>`<div class="ca" onclick="pgProjDetail('${p.id}')"><div class="ca-t">${p.name||'–'}</div><div class="ca-s">${p.kunde||p.kunde_name||'–'}</div>${p.adresse?`<div style="font-size:11px;color:var(--muted);margin-top:6px">📍 ${p.adresse}</div>`:''}<div class="ca-f"><span class="bd bd-g">${p.status||'Aktiv'}</span></div></div>`).join('')}</div>`}`);}catch(e){sC(`<div class="em"><div class="em-i">⚠️</div><div class="em-t">Fehler: ${e.message}</div></div>`);}}
async function pgKunden(){ld();try{const{data}=await sb.from('kunden').select('*').order('created_at',{ascending:false});sC(`<div class="ph"><div><div class="pt">👥 Kunden</div><div class="ps">${(data||[]).length} Kunde(n)</div></div><button class="bp" onclick="mKunde()">＋ Neuer Kunde</button></div>${!(data&&data.length)?'<div class="em"><div class="em-i">👥</div><div class="em-t">Noch keine Kunden</div></div>':`<div class="gr">${data.map(k=>`<div class="ca" onclick="pgKundeDetail('${k.id}')"><div style="display:flex;align-items:center;gap:10px"><div style="width:40px;height:40px;background:var(--pl);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:var(--p)">${(k.name||'?')[0].toUpperCase()}</div><div><div class="ca-t">${k.name||'–'}</div><div class="ca-s">${k.telefon||k.email||'–'}</div></div></div>${k.adresse?`<div style="font-size:11px;color:var(--muted);margin-top:8px">📍 ${k.adresse}</div>`:''}<div class="ca-f"><span class="bd bd-b">Details →</span></div></div>`).join('')}</div>`}`);}catch(e){sC(`<div class="em"><div class="em-i">⚠️</div><div class="em-t">${e.message}</div></div>`);}}
function mKunde(k={}){oM(`<div class="mt">${k.id?'Kunde bearbeiten':'👥 Neuer Kunde'}</div><div class="fg"><label>NAME *</label><input id="f-n" value="${k.name||''}" placeholder="Frank Müller"></div><div class="fr"><div class="fg"><label>TELEFON</label><input id="f-tel" value="${k.telefon||''}" placeholder="+49 176 ..."></div><div class="fg"><label>E-MAIL</label><input id="f-em" value="${k.email||''}" placeholder="info@..."></div></div><div class="fg"><label>ADRESSE</label><input id="f-adr" value="${k.adresse||''}" placeholder="Musterstr. 1, Berlin"></div><div class="fg"><label>NOTIZ</label><textarea id="f-not" rows="2">${k.notiz||''}</textarea></div><div class="ma"><button class="bc" onclick="cM()">Abbrechen</button><button class="bs" onclick="saveKunde('${k.id||''}')">💾 Speichern</button></div>`);}
async function saveKunde(id){const n=document.getElementById('f-n').value.trim();if(!n){alert('Bitte Name eingeben!');return;}const o={name:n,telefon:document.getElementById('f-tel').value,email:document.getElementById('f-em').value,adresse:document.getElementById('f-adr').value,notiz:document.getElementById('f-not').value,user_id:me.id};const{error}=id?await sb.from('kunden').update(o).eq('id',id):await sb.from('kunden').insert(o);if(error){alert('Fehler: '+error.message);return;}cM();pgKunden();}
async function pgKundeDetail(id){ld();const[{data:k},{data:proj}]=await Promise.all([sb.from('kunden').select('*').eq('id',id).single(),sb.from('projekte').select('*').eq('kunden_id',id)]);const mapQ=encodeURIComponent(k?.adresse||'Berlin');sC(`<button class="bk" onclick="pgKunden()">← Zurück</button><div class="ph"><div><div class="pt">${k?.name||'Kunde'}</div><div class="ps">${k?.telefon||''}</div></div><button class="bp" onclick='mKunde(${JSON.stringify(k).replace(/'/g,"&#39;")})'>✏️ Bearbeiten</button></div><div class="info-grid"><div class="info-box"><div class="info-label">TELEFON</div><div class="info-val">${k?.telefon||'–'}</div></div><div class="info-box"><div class="info-label">E-MAIL</div><div class="info-val" style="font-size:12px">${k?.email||'–'}</div></div><div class="info-box" style="grid-column:1/-1"><div class="info-label">ADRESSE</div><div class="info-val">${k?.adresse||'–'}</div></div></div>${k?.adresse?`<div class="map-wrap"><iframe src="https://maps.google.com/maps?q=${mapQ}&output=embed&z=15" allowfullscreen></iframe></div>`:''}<div class="sh">🏗️ Projekte</div>${!(proj&&proj.length)?'<div class="em" style="padding:20px"><div class="em-t">Keine Projekte</div></div>':`<div class="gr">${proj.map(p=>`<div class="ca" onclick="pgProjDetail('${p.id}')"><div class="ca-t">${p.name}</div></div>`).join('')}</div>`}`);}
async function pgProj(){ld();try{const{data}=await sb.from('projekte').select('*').order('created_at',{ascending:false});sC(`<div class="ph"><div><div class="pt">🏗️ Projekte</div><div class="ps">${(data||[]).length} Projekt(e)</div></div><button class="bp" onclick="mProj()">＋ Neues Projekt</button></div>${!(data&&data.length)?'<div class="em"><div class="em-i">🏗️</div><div class="em-t">Noch keine Projekte</div></div>':`<div class="gr">${data.map(p=>`<div class="ca" onclick="pgProjDetail('${p.id}')"><div class="ca-t">${p.name||'–'}</div><div class="ca-s">${p.kunde||p.kunde_name||'–'}</div>${p.adresse?`<div style="font-size:11px;color:var(--muted);margin-top:5px">📍 ${p.adresse}</div>`:''}<div class="ca-f"><span class="bd bd-g">${p.status||'Aktiv'}</span></div></div>`).join('')}</div>`}`);}catch(e){sC(`<div class="em"><div class="em-i">⚠️</div><div class="em-t">${e.message}</div></div>`);}}
async function mProj(){const{data:ku}=await sb.from('kunden').select('id,name');oM(`<div class="mt">🏗️ Neues Projekt</div><div class="fg"><label>PROJEKTNAME *</label><input id="f-n" placeholder="z.B. Baustelle Berlin"></div><div class="fg"><label>KUNDE</label><select id="f-ku"><option value="">– Kein Kunde –</option>${(ku||[]).map(k=>`<option value="${k.id}" data-n="${k.name}">${k.name}</option>`).join('')}</select></div><div class="fg"><label>ADRESSE</label><input id="f-adr" placeholder="Musterstraße 1, Berlin"></div><div class="fg"><label>BESCHREIBUNG</label><textarea id="f-desc" rows="3"></textarea></div><div class="fr"><div class="fg"><label>START</label><input id="f-start" type="date"></div><div class="fg"><label>ENDE</label><input id="f-end" type="date"></div></div><div class="ma"><button class="bc" onclick="cM()">Abbrechen</button><button class="bs" onclick="saveProj()">💾 Speichern</button></div>`);}
async function saveProj(){const n=document.getElementById('f-n').value.trim();if(!n){alert('Projektname fehlt!');return;}const s=document.getElementById('f-ku');const ki=s.value||null,kn=ki?s.options[s.selectedIndex].dataset.n:'';const{error}=await sb.from('projekte').insert({name:n,kunden_id:ki,kunde_name:kn,kunde:kn,adresse:document.getElementById('f-adr').value,beschreibung:document.getElementById('f-desc').value,datum_start:document.getElementById('f-start').value||null,datum_end:document.getElementById('f-end').value||null,autor_id:me.id});if(error){alert('Fehler: '+error.message);return;}cM();pgProj();}
async function pgProjDetail(id){ld();const[{data:p},{data:bt},{data:mat},{data:std},{data:ang}]=await Promise.all([sb.from('projekte').select('*').eq('id',id).single(),sb.from('bautagebuch').select('*').eq('projekt_id',id).order('datum',{ascending:false}),sb.from('material').select('*').eq('projekt_id',id),sb.from('stunden').select('*').eq('projekt_id',id),sb.from('angebote').select('*').eq('projekt_id',id)]);const mapQ=encodeURIComponent(p?.adresse||'Berlin');sC(`<button class="bk" onclick="pgProj()">← Zurück</button><div class="ph"><div><div class="pt">${p?.name||'Projekt'}</div><div class="ps">${p?.kunde||p?.kunde_name||''} ${p?.adresse?'· '+p.adresse:''}</div></div></div>${p?.adresse?`<div class="map-wrap"><iframe src="https://maps.google.com/maps?q=${mapQ}&output=embed&z=15" allowfullscreen></iframe></div>`:''}<div class="sh">📸 Fotos</div><div class="photo-up" onclick="document.getElementById('fi').click()"><input type="file" id="fi" accept="image/*" multiple style="display:none" onchange="upFotos('${id}')"><div style="font-size:24px;margin-bottom:6px">📷</div><div style="font-weight:700;font-size:13px">Fotos hinzufügen</div></div><div id="fp" class="photo-prev"></div><div class="sh">📋 Bautagebuch (${(bt||[]).length})</div><div class="tc"><div class="th"><span class="th-t">Einträge</span><button class="bp" style="padding:7px 12px;font-size:12px" onclick="mBt('${id}')">＋ Eintrag</button></div><table><thead><tr><th>Datum</th><th>Beschreibung</th><th>Wetter</th></tr></thead><tbody>${!(bt&&bt.length)?'<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--muted)">Keine Einträge</td></tr>':bt.map(e=>`<tr><td>${e.datum||'–'}</td><td>${e.beschreibung||'–'}</td><td>${e.wetter||'–'}</td></tr>`).join('')}</tbody></table></div><div class="sh">📄 Angebote (${(ang||[]).length})</div><div class="tc"><div class="th"><span class="th-t">Angebote</span><button class="bp" style="padding:7px 12px;font-size:12px" onclick="mAng('${id}','${p?.kunde||p?.kunde_name||''}')">＋ Angebot</button></div><table><thead><tr><th>Nr.</th><th>Titel</th><th>Betrag</th><th>Status</th></tr></thead><tbody>${!(ang&&ang.length)?'<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--muted)">Keine Angebote</td></tr>':ang.map(a=>`<tr><td style="font-family:monospace;font-size:11px">${a.nummer||'–'}</td><td>${a.titel||'–'}</td><td><b>€${parseFloat(a.gesamt||0).toFixed(2)}</b></td><td><span class="bd ${a.status==='angenommen'?'bd-g':a.status==='abgelehnt'?'bd-r':'bd-o'}">${a.status||'offen'}</span></td></tr>`).join('')}</tbody></table></div><div class="sh">🧱 Material (${(mat||[]).length})</div><div class="tc"><div class="th"><span class="th-t">Material</span><button class="bp" style="padding:7px 12px;font-size:12px" onclick="mMat2('${id}')">＋ Material</button></div><table><thead><tr><th>Material</th><th>Menge</th><th>Preis</th></tr></thead><tbody>${!(mat&&mat.length)?'<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--muted)">Kein Material</td></tr>':mat.map(m=>`<tr><td><b>${m.name||'–'}</b></td><td>${m.menge||'–'}</td><td>${m.preis?'€'+parseFloat(m.preis).toFixed(2):'–'}</td></tr>`).join('')}</tbody></table></div><div class="sh">⏱️ Stunden (${(std||[]).length})</div><div class="tc"><div class="th"><span class="th-t">Stunden</span><button class="bp" style="padding:7px 12px;font-size:12px" onclick="mStd2('${id}')">＋ Stunden</button></div><table><thead><tr><th>Datum</th><th>Mitarbeiter</th><th>Stunden</th></tr></thead><tbody>${!(std&&std.length)?'<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--muted)">Keine Stunden</td></tr>':std.map(s=>`<tr><td>${s.datum||'–'}</td><td>${s.mitarbeiter_name||'–'}</td><td><b>${s.stunden||0}h</b></td></tr>`).join('')}</tbody></table></div>`);}
async function upFotos(pid){const files=document.getElementById('fi').files;const prev=document.getElementById('fp');for(const f of files){const r=new FileReader();r.onload=e=>{const i=document.createElement('img');i.src=e.target.result;i.className='pt-img';prev.appendChild(i);};r.readAsDataURL(f);await sb.storage.from('fotos').upload(`${pid}/${Date.now()}_${f.name}`,f).catch(()=>{});}}
async function pgTermine(){ld();try{const heute=new Date();const[{data},{data:proj}]=await Promise.all([sb.from('termine').select('*').order('datum'),sb.from('projekte').select('id,name')]);const yr=heute.getFullYear(),mo=heute.getMonth();const firstDay=new Date(yr,mo,1).getDay();const dim=new Date(yr,mo+1,0).getDate();const monate=['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];let cc='';const pad=n=>String(n).padStart(2,'0');for(let i=0;i<(firstDay===0?6:firstDay-1);i++)cc+=`<div class="cal-day" style="background:#fafafa"></div>`;for(let d=1;d<=dim;d++){const ds=`${yr}-${pad(mo+1)}-${pad(d)}`;const de=(data||[]).filter(t=>t.datum===ds);const it=ds===heute.toISOString().split('T')[0];cc+=`<div class="cal-day${it?' today':''}" onclick='mTermin("${ds}",${JSON.stringify(proj||[]).replace(/"/g,"&quot;")})'><div class="cal-dn${it?' cur':''}">${d}</div>${de.slice(0,2).map(e=>`<div class="cal-ev">${e.titel||'Termin'}</div>`).join('')}</div>`;}const up=(data||[]).filter(t=>t.datum>=heute.toISOString().split('T')[0]).slice(0,10);sC(`<div class="ph"><div><div class="pt">📅 Termine</div><div class="ps">${(data||[]).length} Termin(e)</div></div><button class="bp" onclick='mTermin("",${JSON.stringify(proj||[]).replace(/'/g,"&#39;")})'>＋ Neuer Termin</button></div><div class="cal"><div class="cal-head"><div style="font-size:15px;font-weight:700">📅 ${monate[mo]} ${yr}</div></div><div class="cal-grid"><div class="cal-day-h">Mo</div><div class="cal-day-h">Di</div><div class="cal-day-h">Mi</div><div class="cal-day-h">Do</div><div class="cal-day-h">Fr</div><div class="cal-day-h">Sa</div><div class="cal-day-h">So</div>${cc}</div></div><div class="sh">Kommende Termine</div><div class="tc"><table><thead><tr><th>Datum</th><th>Zeit</th><th>Titel</th><th>Status</th></tr></thead><tbody>${!up.length?'<tr><td colspan="4" style="text-align:center;padding:20px;color:var(--muted)">Keine Termine</td></tr>':up.map(t=>`<tr><td>${t.datum||'–'}</td><td>${t.uhrzeit||'–'}</td><td><b>${t.titel||'–'}</b></td><td><span class="bd ${t.status==='erledigt'?'bd-g':t.status==='abgesagt'?'bd-r':'bd-b'}">${t.status||'geplant'}</span></td></tr>`).join('')}</tbody></table></div>`);}catch(e){sC(`<div class="em"><div class="em-i">⚠️</div><div class="em-t">${e.message}</div></div>`);}}
function mTermin(datum,proj){oM(`<div class="mt">📅 Neuer Termin</div><div class="fg"><label>TITEL *</label><input id="f-t" placeholder="z.B. Wartungsarbeiten"></div><div class="fg"><label>PROJEKT</label><select id="f-p"><option value="">– Kein Projekt –</option>${(proj||[]).map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div><div class="fr"><div class="fg"><label>DATUM</label><input id="f-d" type="date" value="${datum||new Date().toISOString().split('T')[0]}"></div><div class="fg"><label>UHRZEIT</label><input id="f-u" type="time" value="08:00"></div></div><div class="fg"><label>STATUS</label><select id="f-s"><option value="geplant">Geplant</option><option value="erledigt">Erledigt</option><option value="abgesagt">Abgesagt</option></select></div><div class="ma"><button class="bc" onclick="cM()">Abbrechen</button><button class="bs" onclick="saveTermin()">💾 Speichern</button></div>`);}
async function saveTermin(){const t=document.getElementById('f-t').value.trim();if(!t){alert('Titel fehlt!');return;}const{error}=await sb.from('termine').insert({titel:t,projekt_id:document.getElementById('f-p').value||null,datum:document.getElementById('f-d').value,uhrzeit:document.getElementById('f-u').value,status:document.getElementById('f-s').value,user_id:me.id});if(error){alert('Fehler: '+error.message);return;}cM();pgTermine();}
async function pgAngebote(){ld();try{const[{data},{data:proj}]=await Promise.all([sb.from('angebote').select('*').order('created_at',{ascending:false}),sb.from('projekte').select('id,name')]);sC(`<div class="ph"><div><div class="pt">📄 Angebote</div><div class="ps">${(data||[]).length} Angebot(e)</div></div><button class="bp" onclick='mAng("","",${JSON.stringify(proj||[]).replace(/'/g,"&#39;")})'>＋ Neues Angebot</button></div><div class="tc"><table><thead><tr><th>Nr.</th><th>Datum</th><th>Titel</th><th>Betrag</th><th>Status</th></tr></thead><tbody>${!(data&&data.length)?'<tr><td colspan="5"><div class="em" style="padding:30px"><div class="em-i">📄</div><div class="em-t">Keine Angebote</div></div></td></tr>':data.map(a=>`<tr><td style="font-family:monospace;font-size:11px">${a.nummer||'–'}</td><td>${a.datum||'–'}</td><td><b>${a.titel||'–'}</b></td><td><b>€${parseFloat(a.gesamt||0).toFixed(2)}</b></td><td><span class="bd ${a.status==='angenommen'?'bd-g':a.status==='abgelehnt'?'bd-r':'bd-o'}">${a.status||'offen'}</span></td></tr>`).join('')}</tbody></table></div>`);}catch(e){sC(`<div class="em"><div class="em-i">⚠️</div><div class="em-t">${e.message}</div></div>`);}}
function mAng(pid,kn,proj){const nr='A-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000)+1000);oM(`<div class="mt">📄 Angebot erstellen</div><div class="fr"><div class="fg"><label>ANGEBOTSNR.</label><input id="f-nr" value="${nr}"></div><div class="fg"><label>DATUM</label><input id="f-d" type="date" value="${new Date().toISOString().split('T')[0]}"></div></div><div class="fg"><label>TITEL *</label><input id="f-t" placeholder="z.B. Sanierungsarbeiten"></div><div class="fg"><label>PROJEKT</label><select id="f-p"><option value="">–</option>${(proj||[]).map(p=>`<option value="${p.id}"${p.id===pid?' selected':''}>${p.name}</option>`).join('')}</select></div><div class="fg"><label>KUNDE</label><input id="f-ku" value="${kn||''}" placeholder="Kundenname"></div><div class="fg"><label>POSITIONEN</label><div id="pos-wrap"><div class="offer-row"><input placeholder="Leistung" class="pos-name"><input placeholder="Preis €" type="number" class="pos-price price-inp" oninput="calcTotal()"></div></div><button type="button" onclick="addPos()" style="margin-top:6px;padding:6px 12px;background:var(--pl);color:var(--pd);border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">＋ Position</button><div class="offer-total">Gesamt: €<span id="tot">0.00</span></div></div><div class="fg"><label>STATUS</label><select id="f-s"><option value="offen">Offen</option><option value="angenommen">Angenommen</option><option value="abgelehnt">Abgelehnt</option></select></div><div class="ma"><button class="bc" onclick="cM()">Abbrechen</button><button class="bs" onclick="saveAng()">💾 Speichern</button></div>`);}
function addPos(){const w=document.getElementById('pos-wrap');const r=document.createElement('div');r.className='offer-row';r.innerHTML='<input placeholder="Leistung" class="pos-name"><input placeholder="Preis €" type="number" class="pos-price price-inp" oninput="calcTotal()">';w.appendChild(r);}
function calcTotal(){let t=0;document.querySelectorAll('.pos-price').forEach(p=>t+=parseFloat(p.value)||0);document.getElementById('tot').textContent=t.toFixed(2);}
async function saveAng(){const t=document.getElementById('f-t').value.trim();if(!t){alert('Titel fehlt!');return;}const ns=document.querySelectorAll('.pos-name'),ps=document.querySelectorAll('.pos-price');const pos=[];let total=0;ns.forEach((n,i)=>{if(n.value.trim()){const pr=parseFloat(ps[i].value)||0;pos.push({name:n.value,preis:pr});total+=pr;}});const{error}=await sb.from('angebote').insert({nummer:document.getElementById('f-nr').value,titel:t,projekt_id:document.getElementById('f-p').value||null,kunde:document.getElementById('f-ku').value,datum:document.getElementById('f-d').value,positionen:JSON.stringify(pos),gesamt:total,status:document.getElementById('f-s').value,user_id:me.id});if(error){alert('Fehler: '+error.message);return;}cM();pgAngebote();}
async function pgMit(){ld();const{data}=await sb.from('profiles').select('*');sC(`<div class="ph"><div><div class="pt">👷 Mitarbeiter</div></div></div>${!(data&&data.length)?'<div class="em"><div class="em-i">👷</div><div class="em-t">Noch keine Mitarbeiter</div></div>':`<div class="gr">${data.map(m=>`<div class="ca"><div style="display:flex;align-items:center;gap:10px"><div style="width:42px;height:42px;background:var(--pl);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;color:var(--p)">${(m.full_name||m.email||'?')[0].toUpperCase()}</div><div><div class="ca-t">${m.full_name||'Unbekannt'}</div><div class="ca-s">${m.email||'–'}</div></div></div><div class="ca-f"><span class="bd bd-b">${m.rolle||'Mitarbeiter'}</span></div></div>`).join('')}</div>`}`);}
async function pgStd(){ld();try{const[{data},{data:proj}]=await Promise.all([sb.from('stunden').select('*').order('datum',{ascending:false}),sb.from('projekte').select('id,name')]);const total=(data||[]).reduce((s,r)=>s+(parseFloat(r.stunden)||0),0);sC(`<div class="ph"><div><div class="pt">⏱️ Stunden</div><div class="ps">Gesamt: ${total.toFixed(1)}h</div></div><button class="bp" onclick='mStdAllg(${JSON.stringify(proj||[]).replace(/'/g,"&#39;")})'>＋ Eintragen</button></div><div class="tc"><table><thead><tr><th>Datum</th><th>Mitarbeiter</th><th>Projekt</th><th>Stunden</th></tr></thead><tbody>${!(data&&data.length)?'<tr><td colspan="4"><div class="em" style="padding:30px"><div class="em-i">⏱️</div><div class="em-t">Keine Einträge</div></div></td></tr>':data.map(s=>`<tr><td>${s.datum||'–'}</td><td>${s.mitarbeiter_name||'–'}</td><td>${(proj||[]).find(p=>p.id===s.projekt_id)?.name||'–'}</td><td><b>${s.stunden||0}h</b></td></tr>`).join('')}</tbody></table></div>`);}catch(e){sC(`<div class="em"><div class="em-i">⚠️</div><div class="em-t">${e.message}</div></div>`);}}
function mStd2(pid){oM(`<div class="mt">⏱️ Stunden eintragen</div><input type="hidden" id="f-p" value="${pid}"><div class="fg"><label>MITARBEITER</label><input id="f-n" placeholder="Max Mustermann"></div><div class="fg"><label>DATUM</label><input id="f-d" type="date" value="${new Date().toISOString().split('T')[0]}"></div><div class="fg"><label>STUNDEN *</label><input id="f-s" type="number" step="0.5" min="0.5" max="24" placeholder="8"></div><div class="ma"><button class="bc" onclick="cM()">Abbrechen</button><button class="bs" onclick="saveStd()">💾 Speichern</button></div>`);}
function mStdAllg(proj){oM(`<div class="mt">⏱️ Stunden eintragen</div><div class="fg"><label>PROJEKT</label><select id="f-p"><option value="">– Kein Projekt –</option>${(proj||[]).map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div><div class="fg"><label>MITARBEITER</label><input id="f-n" placeholder="Max Mustermann"></div><div class="fg"><label>DATUM</label><input id="f-d" type="date" value="${new Date().toISOString().split('T')[0]}"></div><div class="fg"><label>STUNDEN *</label><input id="f-s" type="number" step="0.5" min="0.5" max="24" placeholder="8"></div><div class="ma"><button class="bc" onclick="cM()">Abbrechen</button><button class="bs" onclick="saveStd()">💾 Speichern</button></div>`);}
async function saveStd(){const s=document.getElementById('f-s').value;if(!s){alert('Stunden fehlen!');return;}const{error}=await sb.from('stunden').insert({projekt_id:document.getElementById('f-p').value||null,mitarbeiter_name:document.getElementById('f-n').value,datum:document.getElementById('f-d').value,stunden:parseFloat(s)});if(error){alert('Fehler: '+error.message);return;}cM();pgStd();}
async function pgMat(){ld();try{const[{data},{data:proj}]=await Promise.all([sb.from('material').select('*').order('created_at',{ascending:false}),sb.from('projekte').select('id,name')]);sC(`<div class="ph"><div><div class="pt">🧱 Material</div><div class="ps">${(data||[]).length} Einträge</div></div><button class="bp" onclick='mMatAllg(${JSON.stringify(proj||[]).replace(/'/g,"&#39;")})'>＋ Hinzufügen</button></div><div class="tc"><table><thead><tr><th>Material</th><th>Projekt</th><th>Menge</th><th>Preis</th></tr></thead><tbody>${!(data&&data.length)?'<tr><td colspan="4"><div class="em" style="padding:30px"><div class="em-i">🧱</div><div class="em-t">Kein Material</div></div></td></tr>':data.map(m=>`<tr><td><b>${m.name||'–'}</b></td><td>${(proj||[]).find(p=>p.id===m.projekt_id)?.name||m.projekt||'–'}</td><td>${m.menge||'–'}</td><td>${m.preis?'€'+parseFloat(m.preis).toFixed(2):'–'}</td></tr>`).join('')}</tbody></table></div>`);}catch(e){sC(`<div class="em"><div class="em-i">⚠️</div><div class="em-t">${e.message}</div></div>`);}}
function mMat2(pid){oM(`<div class="mt">🧱 Material</div><input type="hidden" id="f-p" value="${pid}"><div class="fg"><label>MATERIALNAME *</label><input id="f-n" placeholder="z.B. Zement"></div><div class="fr"><div class="fg"><label>MENGE</label><input id="f-m" placeholder="50 Säcke"></div><div class="fg"><label>PREIS (€)</label><input id="f-pr" type="number" step="0.01" placeholder="0.00"></div></div><div class="ma"><button class="bc" onclick="cM()">Abbrechen</button><button class="bs" onclick="saveMat()">💾 Speichern</button></div>`);}
function mMatAllg(proj){oM(`<div class="mt">🧱 Material</div><div class="fg"><label>PROJEKT</label><select id="f-p"><option value="">–</option>${(proj||[]).map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div><div class="fg"><label>MATERIALNAME *</label><input id="f-n" placeholder="z.B. Zement"></div><div class="fr"><div class="fg"><label>MENGE</label><input id="f-m" placeholder="50 Säcke"></div><div class="fg"><label>PREIS (€)</label><input id="f-pr" type="number" step="0.01" placeholder="0.00"></div></div><div class="ma"><button class="bc" onclick="cM()">Abbrechen</button><button class="bs" onclick="saveMat()">💾 Speichern</button></div>`);}
async function saveMat(){const n=document.getElementById('f-n').value.trim();if(!n){alert('Name fehlt!');return;}const{error}=await sb.from('material').insert({projekt_id:document.getElementById('f-p').value||null,name:n,menge:document.getElementById('f-m').value,preis:parseFloat(document.getElementById('f-pr').value)||null});if(error){alert('Fehler: '+error.message);return;}cM();pgMat();}
async function pgRech(){ld();try{const[{data},{data:proj}]=await Promise.all([sb.from('rechnungen').select('*').order('datum',{ascending:false}),sb.from('projekte').select('id,name')]);const paid=(data||[]).filter(r=>r.status==='bezahlt').reduce((s,r)=>s+(parseFloat(r.betrag)||0),0);const open=(data||[]).filter(r=>r.status==='offen').reduce((s,r)=>s+(parseFloat(r.betrag)||0),0);sC(`<div class="ph"><div><div class="pt">💶 Rechnungen</div><div class="ps">${(data||[]).length} Rechnung(en)</div></div><button class="bp" onclick='mRech(${JSON.stringify(proj||[]).replace(/'/g,"&#39;")})'>＋ Erstellen</button></div><div class="sts" style="grid-template-columns:repeat(auto-fill,minmax(170px,1fr))"><div class="st g"><div class="si">✅</div><div class="sv">€${paid.toFixed(0)}</div><div class="sl">Bezahlt</div></div><div class="st o"><div class="si">⏳</div><div class="sv">€${open.toFixed(0)}</div><div class="sl">Offen</div></div></div><div class="tc"><table><thead><tr><th>Nr.</th><th>Datum</th><th>Kunde</th><th>Betrag</th><th>Status</th></tr></thead><tbody>${!(data&&data.length)?'<tr><td colspan="5"><div class="em" style="padding:30px"><div class="em-i">💶</div><div class="em-t">Keine Rechnungen</div></div></td></tr>':data.map(r=>`<tr><td style="font-family:monospace;font-size:11px">${r.rechnungsnummer||'–'}</td><td>${r.datum||'–'}</td><td>${r.kunde||'–'}</td><td><b>€${parseFloat(r.betrag||0).toFixed(2)}</b></td><td><span class="bd ${r.status==='bezahlt'?'bd-g':r.status==='offen'?'bd-o':'bd-r'}">${r.status||'offen'}</span></td></tr>`).join('')}</tbody></table></div>`);}catch(e){sC(`<div class="em"><div class="em-i">⚠️</div><div class="em-t">${e.message}</div></div>`);}}
function mRech(proj){const nr='RE-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000)+1000);oM(`<div class="mt">💶 Rechnung erstellen</div><div class="fr"><div class="fg"><label>RECHNUNGSNR.</label><input id="f-nr" value="${nr}"></div><div class="fg"><label>DATUM</label><input id="f-d" type="date" value="${new Date().toISOString().split('T')[0]}"></div></div><div class="fg"><label>PROJEKT</label><select id="f-p"><option value="">–</option>${(proj||[]).map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div><div class="fg"><label>KUNDE *</label><input id="f-ku" placeholder="Müller GmbH"></div><div class="fg"><label>BETRAG (€) *</label><input id="f-b" type="number" step="0.01" placeholder="0.00"></div><div class="fg"><label>STATUS</label><select id="f-s"><option value="offen">Offen</option><option value="bezahlt">Bezahlt</option><option value="storniert">Storniert</option></select></div><div class="ma"><button class="bc" onclick="cM()">Abbrechen</button><button class="bs" onclick="saveRech()">💾 Erstellen</button></div>`);}
async function saveRech(){const ku=document.getElementById('f-ku').value.trim(),b=document.getElementById('f-b').value;if(!ku||!b){alert('Kunde und Betrag fehlen!');return;}const{error}=await sb.from('rechnungen').insert({rechnungsnummer:document.getElementById('f-nr').value,projekt_id:document.getElementById('f-p').value||null,kunde:ku,datum:document.getElementById('f-d').value,betrag:parseFloat(b),status:document.getElementById('f-s').value});if(error){alert('Fehler: '+error.message);return;}cM();pgRech();}
function mBt(pid){oM(`<div class="mt">📋 Bautagebuch</div><div class="fg"><label>DATUM</label><input id="f-d" type="date" value="${new Date().toISOString().split('T')[0]}"></div><div class="fg"><label>BESCHREIBUNG *</label><textarea id="f-desc" rows="4" placeholder="Was wurde heute gemacht?"></textarea></div><div class="fg"><label>WETTER</label><input id="f-w" placeholder="z.B. Sonnig, 18°C"></div><div class="ma"><button class="bc" onclick="cM()">Abbrechen</button><button class="bs" onclick="saveBt('${pid}')">💾 Speichern</button></div>`);}
async function saveBt(pid){const d=document.getElementById('f-desc').value.trim();if(!d){alert('Beschreibung fehlt!');return;}const{error}=await sb.from('bautagebuch').insert({projekt_id:pid,datum:document.getElementById('f-d').value,beschreibung:d,wetter:document.getElementById('f-w').value});if(error){alert('Fehler: '+error.message);return;}cM();pgProjDetail(pid);}
sb.auth.getSession().then(({data:{session}})=>{if(session)sA(session.user);});
</script>
